<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小喵呀的沒用網站 - 雲端連線版</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { display: flex; height: 100vh; background-color: #f5f5f5; color: #333; }
        
        /* 左側選單欄 */
        .sidebar { width: 250px; background-color: #2c3e50; color: white; padding: 20px 0; display: flex; flex-direction: column; }
        .sidebar h2 { text-align: center; margin-bottom: 30px; font-size: 22px; color: #3498db; }
        .menu-btn { background: none; border: none; color: #ecf0f1; padding: 15px 25px; text-align: left; font-size: 16px; cursor: pointer; transition: 0.3s; width: 100%; }
        .menu-btn:hover, .menu-btn.active { background-color: #34495e; color: #3498db; border-left: 5px solid #3498db; }
        
        /* 主要內容區 */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .page { display: none; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 800px; }
        .page.active { display: block; }
        
        h1 { margin-bottom: 20px; color: #2c3e50; }
        p { line-height: 1.6; margin-bottom: 15px; }
        a { color: #e74c3c; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
        
        /* 輸入框與按鈕 */
        input { display: block; width: 100%; max-width: 300px; padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px; }
        button { background-color: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #2980b9; }
        .btn-danger { background-color: #e74c3c; }
        .btn-danger:hover { background-color: #c0392b; }
        
        /* 影片 */
        .video-container { margin-top: 20px; background: #000; position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 8px; max-width: 560px; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* 留言板 */
        .comment-list { border-top: 1px solid #eee; padding-top: 15px; max-height: 400px; overflow-y: auto; }
        .comment-item { background: #f9f9f9; padding: 10px; margin-bottom: 10px; border-radius: 4px; border-left: 4px solid #3498db; }
        .comment-user { font-weight: bold; color: #2c3e50; font-size: 14px; }
        .comment-text { margin-top: 5px; }
        
        /* 排行榜 */
        .click-section { text-align: center; padding: 20px; background: #f9f9f9; border-radius: 8px; margin-bottom: 20px; }
        .click-btn { font-size: 24px; padding: 15px 40px; background-color: #2ecc71; }
        .click-btn:hover { background-color: #27ae60; }
        .counter { font-size: 28px; margin-top: 10px; font-weight: bold; color: #27ae60; }
        .leaderboard-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .leaderboard-table th, .leaderboard-table td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        .leaderboard-table th { background-color: #f2f2f2; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>選單欄</h2>
        <button class="menu-btn active" onclick="switchPage('home')">首頁</button>
        <button class="menu-btn" onclick="switchPage('youtube')">我的 YouTube 頻道</button>
        <button class="menu-btn" onclick="switchPage('comments')">留言板</button>
        <button class="menu-btn" onclick="switchPage('clicker')">點擊與排行榜</button>
        <button class="menu-btn" id="nav-auth" onclick="switchPage('auth')">登入註冊</button>
        <button class="menu-btn" id="nav-account" style="display:none;" onclick="switchPage('account')">我的帳號</button>
    </div>

    <div class="main-content">
        <!-- 首頁 -->
        <div id="page-home" class="page active">
            <h1>歡迎</h1>
            <p style="font-size: 18px; font-weight: bold;">歡迎來到我的沒用網站，但你點進來了，還不訂閱我的YouTube頻道嗎？</p>
            
            <div style="margin-top: 25px; padding: 15px; background-color: #fff3cd; border-left: 5px solid #ffc107; border-radius: 4px; max-width: 600px;">
                <h3 style="color: #856404; margin-bottom: 8px;">📢 最新公告</h3>
                <p style="margin-bottom: 0; color: #856404; font-size: 15px;">
                    test
                </p>
            </div>
        </div>

        <!-- YouTube 頻道區 -->
        <div id="page-youtube" class="page">
            <h1>我的 YouTube 頻道</h1>
            <p><a href="https://www.youtube.com/@little_cat_ya" target="_blank">👉 點我前往我的 YouTube 頻道 👈</a></p>
            <h3>最新影片：</h3>
            <div class="video-container">
                <div id="youtube-container"><p style="color: white; padding: 20px;">正在載入...</p></div>
            </div>
        </div>

        <!-- 留言板 -->
        <div id="page-comments" class="page">
            <h1>留言板</h1>
            <p id="comment-warn" style="color: red;">⚠️ 請先登入才能留言！</p>
            <div id="comment-input-area" style="display: none;">
                <input type="text" id="comment-input" placeholder="輸入你想說的話...">
                <button onclick="postComment()">送出留言</button>
            </div>
            <div class="comment-list" id="comment-list">正在載入留言...</div>
        </div>

        <!-- 點擊與排行榜 -->
        <div id="page-clicker" class="page">
            <h1>點擊與排行榜</h1>
            <div class="click-section">
                <button class="click-btn" onclick="handleClick()">點我！</button>
                <div class="counter">我的點擊數: <span id="my-clicks">0</span></div>
            </div>
            <h3>🏆 全球雲端即時排行榜</h3>
            <table class="leaderboard-table"><tbody id="leaderboard-body"></tbody></table>
        </div>

        <!-- 登入與帳號區 -->
        <div id="page-auth" class="page">
            <h1>登入 / 註冊</h1>
            <input type="text" id="login-user" placeholder="帳號">
            <input type="password" id="login-pass" placeholder="密碼">
            <button onclick="login()">登入</button>
            <hr style="margin:20px 0">
            <h3>新用戶註冊</h3>
            <input type="text" id="reg-user" placeholder="新帳號">
            <input type="password" id="reg-pass" placeholder="新密碼">
            <button onclick="register()">註冊</button>
        </div>

        <div id="page-account" class="page">
            <h1>我的帳號</h1>
            <p>目前登入：<span id="current-username" style="font-weight: bold; color: #3498db;"></span></p>
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
            <h3>修改密碼</h3>
            <input type="password" id="change-pass" placeholder="輸入新密碼">
            <button onclick="changePassword()">確認修改</button>
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
            <button class="btn-danger" onclick="logout()">登出帳號</button>
        </div>
    </div>

    <script>
        const FIREBASE_URL = "https://asume-1fda2-default-rtdb.firebaseio.com/";
        let currentUser = sessionStorage.getItem('currentUser') || null;

        async function fbFetch(path, options = {}) {
            try { const res = await fetch(`${FIREBASE_URL}${path}.json`, options); return await res.json(); }
            catch(e) { return null; }
        }

        function switchPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`page-${pageId}`).classList.add('active');
            if(pageId === 'comments') streamComments();
            if(pageId === 'clicker') streamLeaderboard();
        }

        async function updateUI() {
            if (currentUser) {
                document.getElementById('nav-auth').style.display = 'none';
                document.getElementById('nav-account').style.display = 'block';
                document.getElementById('comment-warn').style.display = 'none';
                document.getElementById('comment-input-area').style.display = 'block';
                document.getElementById('current-username').innerText = currentUser;
                let data = await fbFetch(`/users/${currentUser}`);
                document.getElementById('my-clicks').innerText = (data && data.clicks) ? data.clicks : 0;
            } else {
                document.getElementById('nav-auth').style.display = 'block';
                document.getElementById('nav-account').style.display = 'none';
                document.getElementById('comment-warn').style.display = 'block';
                document.getElementById('comment-input-area').style.display = 'none';
            }
        }

        async function postComment() {
            let text = document.getElementById('comment-input').value.trim();
            if(!text) return;
            let now = new Date();
            let timeString = `${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
            await fbFetch(`/comments`, { method: 'POST', body: JSON.stringify({ username: currentUser, text: text, time: timeString }) });
            document.getElementById('comment-input').value = '';
            streamComments();
        }

        async function streamComments() {
            let data = await fbFetch(`/comments`);
            let container = document.getElementById('comment-list');
            container.innerHTML = '';
            if(data) {
                Object.values(data).reverse().forEach(c => {
                    container.innerHTML += `<div class="comment-item">
                        <div class="comment-user">👤 ${c.username} <span style="font-size:11px; color:#999; font-weight:normal;">🕒 ${c.time || ''}</span></div>
                        <div class="comment-text">${c.text}</div>
                    </div>`;
                });
            }
        }

        async function handleClick() {
            let c = parseInt(document.getElementById('my-clicks').innerText) + 1;
            document.getElementById('my-clicks').innerText = c;
            await fbFetch(`/users/${currentUser}/clicks`, { method: 'PUT', body: JSON.stringify(c) });
            streamLeaderboard();
        }

        async function streamLeaderboard() {
            let data = await fbFetch(`/users`);
            let body = document.getElementById('leaderboard-body');
            body.innerHTML = '';
            if(data) {
                Object.keys(data).map(u => ({u, c: data[u].clicks || 0})).sort((a,b) => b.c - a.c).forEach((user, i) => {
                    body.innerHTML += `<tr><td>${i+1}</td><td>${user.u}</td><td>${user.c} 次</td></tr>`;
                });
            }
        }

        async function register() {
            let u = document.getElementById('reg-user').value.trim();
            let p = document.getElementById('reg-pass').value;
            await fbFetch(`/users/${u}`, { method: 'PUT', body: JSON.stringify({ password: p, clicks: 0 }) });
            alert('註冊成功！');
        }

        async function login() {
            let u = document.getElementById('login-user').value.trim();
            let p = document.getElementById('login-pass').value;
            let d = await fbFetch(`/users/${u}`);
            if(d && d.password === p) { currentUser = u; sessionStorage.setItem('currentUser', u); updateUI(); switchPage('home'); }
            else alert('錯誤');
        }

        function logout() { currentUser = null; sessionStorage.removeItem('currentUser'); updateUI(); switchPage('home'); }

        function loadLatestYouTubeVideo() {
            fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://www.youtube.com/feeds/videos.xml?channel_id=UCw52qGmG1tD4V8qzrd6G71g`)
                .then(r => r.json()).then(d => {
                    if(d.items && d.items.length > 0) {
                        let v = d.items[0].link.split('v=')[1];
                        document.getElementById('youtube-container').innerHTML = `<iframe width="100%" height="315" src="https://www.youtube.com/embed/${v}" frameborder="0" allowfullscreen></iframe>`;
                    }
                });
        }

        setInterval(() => {
            if(document.getElementById('page-clicker').classList.contains('active')) streamLeaderboard();
            if(document.getElementById('page-comments').classList.contains('active')) streamComments();
        }, 5000);

        updateUI();
        loadLatestYouTubeVideo();
    </script>
</body>
</html>
